services:
  # ASP.NET Core Web API
  - type: web
    name: taskflow-api
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: JwtSettings__SecretKey
        generateValue: true
      - key: JwtSettings__Issuer
        value: TaskFlow.Api
      - key: JwtSettings__Audience
        value: TaskFlow.Client
      - key: JwtSettings__AccessTokenExpirationMinutes
        value: 15
      - key: JwtSettings__RefreshTokenExpirationDays
        value: 7
      - key: AllowedOrigins__0
        value: https://ng-tasksflow.netlify.app
      - key: AllowedOrigins__1
        value: http://localhost:4200
      - key: DataProtection__KeysPath
        value: /app/keys
    healthCheckPath: /health
    
databases:
  # PostgreSQL Database
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
    plan: free
    region: oregon
